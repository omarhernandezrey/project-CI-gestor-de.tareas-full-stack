version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-ci-backend
    ports:
      - '3000:3000'
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres123
      - DB_NAME=project_ci
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ci-network
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: project-ci-db
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=project_ci
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ci-network
    restart: unless-stopped

networks:
  ci-network:
    driver: bridge
    name: ci-network

volumes:
  postgres_data:
