# .github/workflows/ci.yml
# GitHub Actions — CI Pipeline (sustituto de Codeship Pro, EOL desde enero 2026)
# Escenario 8: deployment pipelines y browser testing
#
# Jobs:
#   backend_test     ─┐
#   frontend_test    ─┤─► docker_build ─► integration_test ─► browser_test
#   release_notice     (solo en push a main, en paralelo con integration_test)

name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ── Job 1: Tests unitarios del backend ──────────────────────────────────────
  backend_test:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

  # ── Job 2: Tests unitarios del frontend ─────────────────────────────────────
  frontend_test:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ── Job 3: Build Docker images ───────────────────────────────────────────────
  docker_build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend_test, frontend_test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build frontend backend db

      - name: Verify images were created
        run: docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.Size}}"

  # ── Job 4: Integration tests (stack completo) ────────────────────────────────
  integration_test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: docker_build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start full stack
        run: |
          docker compose up -d db backend frontend
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3002/health > /dev/null 2>&1; then
              echo "Backend ready after ${i} attempts"
              break
            fi
            echo "Attempt $i/20 — sleeping 3s..."
            sleep 3
          done

      - name: Health check
        run: curl -fsS http://localhost:3002/health | tee /tmp/health.json

      - name: GET /tasks
        run: curl -fsS http://localhost:3002/tasks | tee /tmp/tasks_before.json

      - name: POST /tasks (smoke test)
        run: |
          curl -fsS -X POST http://localhost:3002/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"Tarea desde GitHub Actions CI"}' \
            | tee /tmp/task_created.json

      - name: Verify task persisted
        run: |
          TASKS=$(curl -fsS http://localhost:3002/tasks)
          echo "$TASKS" | tee /tmp/tasks_after.json
          echo "$TASKS" | grep -q "GitHub Actions" && echo "Task found in DB" || (echo "Task NOT found" && exit 1)

      - name: Frontend responds on port 80
        run: |
          STATUS=$(curl -fsS -o /dev/null -w "%{http_code}" http://localhost)
          echo "Frontend HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || (echo "Expected 200, got $STATUS" && exit 1)

      - name: Collect container logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Stop stack
        if: always()
        run: docker compose down -v

  # ── Job 5: Browser testing con Playwright ────────────────────────────────────
  browser_test:
    name: Browser Tests (Playwright)
    runs-on: ubuntu-latest
    needs: integration_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Start full stack
        run: |
          docker compose up -d db backend frontend
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3002/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            sleep 3
          done
          for i in $(seq 1 10); do
            if curl -sf http://localhost > /dev/null 2>&1; then
              echo "Frontend ready"
              break
            fi
            sleep 3
          done

      - name: Install Playwright + browsers
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Run Playwright browser tests
        run: |
          cat > playwright.config.ts << 'EOF'
          import { defineConfig } from '@playwright/test';
          export default defineConfig({
            testDir: './e2e',
            use: { baseURL: 'http://localhost', headless: true },
            reporter: [['html', { open: 'never' }], ['list']],
          });
          EOF

          mkdir -p e2e
          cat > e2e/app.spec.ts << 'EOF'
          import { test, expect } from '@playwright/test';

          test.describe('Gestor de Tareas - Browser Tests', () => {
            test('la página carga y muestra el título', async ({ page }) => {
              await page.goto('/');
              await expect(page).toHaveTitle(/Gestor|Tareas|Task/i);
            });

            test('el campo de nueva tarea está visible', async ({ page }) => {
              await page.goto('/');
              const input = page.locator('input[type="text"], input[placeholder]').first();
              await expect(input).toBeVisible();
            });

            test('se puede crear una tarea desde el navegador', async ({ page }) => {
              await page.goto('/');
              const input = page.locator('input[type="text"], input[placeholder]').first();
              await input.fill('Tarea creada por Playwright');
              await page.keyboard.press('Enter');
              await expect(page.getByText('Tarea creada por Playwright')).toBeVisible({ timeout: 5000 });
            });
          });
          EOF

          npx playwright test --config=playwright.config.ts

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose down -v

  # ── Job 6: Release notice (solo en push a main) ──────────────────────────────
  release_notice:
    name: Release Notice
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show release info
        run: |
          echo "========================================"
          echo "RELEASE BUILD — rama: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo "Mensaje: ${{ github.event.head_commit.message }}"
          echo "========================================"
          git log --oneline -5
